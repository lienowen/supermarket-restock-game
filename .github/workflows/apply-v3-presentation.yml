name: Apply V3 Presentation Upgrade

on:
  push:
    branches: [main]
    paths:
      - "scripts/apply-v3-presentation-upgrade.mjs"
      - ".github/workflows/apply-v3-presentation.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-v3-presentation
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Apply presentation upgrade
        run: node scripts/apply-v3-presentation-upgrade.mjs

      - name: Commit upgraded presentation
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Presentation is already upgraded."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/game-v2/presentation/ImmersiveDayOneScene.ts
          git commit -m "feat(presentation): render retained cooler and product assets"
          git push origin HEAD:main
