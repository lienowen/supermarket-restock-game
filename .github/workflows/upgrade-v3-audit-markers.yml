name: Upgrade V3 Audit Markers

on:
  push:
    branches: [main]
    paths:
      - "scripts/upgrade-v3-audit-markers.mjs"
      - ".github/workflows/upgrade-v3-audit-markers.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: upgrade-v3-audit-markers
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Update audit markers
        run: node scripts/upgrade-v3-audit-markers.mjs

      - name: Commit updated audit scripts
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Audit scripts already use architecture-v3."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/measure-release-payload.mjs scripts/capture-release-regressions.mjs
          git commit -m "test(v3): validate architecture-v3 runtime markers"
          git push origin HEAD:main
