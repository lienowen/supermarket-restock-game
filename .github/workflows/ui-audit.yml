name: UI Audit

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish pending UI regression status
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.eventName === "pull_request"
              ? context.payload.pull_request.head.sha
              : context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: "pending",
              context: "UI Regression Audit",
              description: "Testing campaign, release payload, bundle and SDK lifecycle",
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Build production bundle
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Verify release bundle
        run: |
          set -o pipefail
          npm run verify:release 2>&1 | tee release-check.log

      - name: Measure initial release payload
        run: |
          set -o pipefail
          node scripts/measure-release-payload.mjs 2>&1 | tee release-payload.log

      - name: Capture release regressions
        run: |
          set -o pipefail
          node scripts/capture-release-regressions.mjs 2>&1 | tee ui-audit-run.log

      - name: Upload CrazyGames release package
        uses: actions/upload-artifact@v4
        with:
          name: crazygames-release
          path: dist
          if-no-files-found: error
          retention-days: 30

      - name: Upload UI audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-audit
          path: |
            ui-audit
            ui-audit-run.log
            build.log
            release-check.log
            release-payload.log
            release-payload-report.json
          if-no-files-found: warn

      - name: Publish UI regression status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const sha = context.eventName === "pull_request"
              ? context.payload.pull_request.head.sha
              : context.sha;
            const passed = "${{ job.status }}" === "success";
            let description = "Campaign, release payload, bundle and SDK regressions passed";
            let failureKey = "runtime";

            if (!passed) {
              description = "UI regression audit failed";
              try {
                const report = JSON.parse(fs.readFileSync("ui-audit/ui-audit-report.json", "utf8"));
                const failed = Object.entries(report.regressions ?? {})
                  .filter(([, value]) => !value)
                  .map(([key]) => key);
                failureKey = failed.join("+") || "runtime";
                const browserIssues = (report.consoleErrors?.length ?? 0)
                  + (report.pageErrors?.length ?? 0)
                  + (report.failedRequests?.length ?? 0)
                  + (report.badResponses?.length ?? 0);
                description = `Failed: ${failureKey}; browser issues ${browserIssues}`;
              } catch {
                try {
                  const payloadReport = JSON.parse(fs.readFileSync("release-payload-report.json", "utf8"));
                  if (payloadReport.fatalError) {
                    failureKey = "release-payload";
                    description = payloadReport.fatalError;
                  } else {
                    const releaseLines = fs.readFileSync("release-check.log", "utf8").trim().split(/\r?\n/);
                    const releaseFailure = releaseLines.find((line) => line.includes("Release check failed"));
                    if (releaseFailure) {
                      failureKey = "release-bundle";
                      description = releaseFailure;
                    } else {
                      const buildLines = fs.readFileSync("build.log", "utf8").trim().split(/\r?\n/);
                      const buildError = buildLines.find((line) => line.includes("error TS")) || buildLines.at(-1);
                      if (buildError) {
                        failureKey = "build";
                        description = `Failed: ${buildError}`;
                      } else {
                        const lines = fs.readFileSync("ui-audit-run.log", "utf8").trim().split(/\r?\n/);
                        const last = lines.at(-1) || "inspect audit log";
                        failureKey = last.toLowerCase().includes("timeout") ? "timeout" : "runtime";
                        description = `Failed: ${last}`;
                      }
                    }
                  }
                } catch {
                  description = "UI regression audit failed; inspect workflow log";
                }
              }
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: passed ? "success" : "failure",
              context: passed ? "UI Regression Audit" : `UI Regression Audit (${failureKey})`,
              description: description.slice(0, 140),
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
