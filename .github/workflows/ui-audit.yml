name: UI Audit

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Build production bundle
        run: npm run build

      - name: Capture UI states and browser errors
        run: node scripts/capture-ui-audit.mjs

      - name: Upload UI audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-audit
          path: ui-audit
          if-no-files-found: error

      - name: Publish UI regression status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.eventName === "pull_request"
              ? context.payload.pull_request.head.sha
              : context.sha;
            const passed = "${{ job.status }}" === "success";
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: passed ? "success" : "failure",
              context: "UI Regression Audit",
              description: passed
                ? "Milk case, stocked lobby and Day 3 handoff passed"
                : "UI regression audit failed; inspect the workflow artifact"
            });
