name: Build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: Run core campaign tests
        run: npm test

      - name: Verify release bundle
        run: |
          set -o pipefail
          npm run verify:release 2>&1 | tee release-check.log

      - name: Upload release check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-check-log
          path: release-check.log
          if-no-files-found: ignore
