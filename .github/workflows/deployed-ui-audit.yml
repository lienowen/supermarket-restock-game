name: Deployed UI Audit

on:
  pull_request:

permissions:
  contents: read

jobs:
  capture-live-site:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Audit deployed Vercel site
        env:
          AUDIT_BASE_URL: https://supermarket-restock-game.vercel.app
        run: node scripts/capture-deployed-ui.mjs

      - name: Upload deployed UI audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployed-ui-audit
          path: deployed-ui-audit
          if-no-files-found: error
