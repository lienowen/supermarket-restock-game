name: Apply V3 Asset Migration

on:
  push:
    branches: [main]
    paths:
      - "scripts/migrate-v3-assets.mjs"
      - ".github/workflows/migrate-v3-assets.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: migrate-v3-assets
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Apply reusable asset migration
        run: node scripts/migrate-v3-assets.mjs

      - name: Commit migrated assets
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Asset tree is already migrated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A public/assets
          git commit -m "chore(assets): migrate retained art into v3 catalogue"
          git push origin HEAD:main
